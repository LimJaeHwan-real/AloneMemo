name: Deploy to EC2 (CD)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 스크립트 실행 중 에러 발생 시 즉시 중단 (GitHub Actions 실패 처리)
            set -e

            # 1. 프로젝트 폴더로 이동 (서버 내 실제 경로에 맞춰 수정 필요)
            cd /home/ubuntu/jungle/AloneMemo

            # 2. 최신 코드 받기
            git pull origin main

            # Shell 환경 (MacOS/Linux/Windows bash)
            source .venv/bin/activate

            # 3. 라이브러리 설치
            pip install -r requirements.txt

            # 4. 기존 실행 중인 서버 종료 (app.py 프로세스 찾아서 kill)
            ps -ef | grep 'python app.py' | grep -v grep | awk '{print $2}' | xargs -r kill -9

            # 5. 서버 재실행 (nohup으로 백그라운드 실행)
            nohup python app.py > app.log 2>&1 &script: |
            set -e

            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/jungle/AloneMemo

            # 2. 최신 코드 받기
            git pull origin main

            # 3. 가상 환경 내의 pip으로 라이브러리 설치 (가장 확실한 방법)
            # .venv 폴더가 이미 서버에 생성되어 있어야 합니다.
            ./.venv/bin/pip install -r requirements.txt

            # 4. 기존 실행 중인 서버 안전하게 종료
            # app.py를 실행 중인 프로세스만 찾아 종료 (없어도 에러 안 남)
            pkill -f "python app.py" || true

            # 5. 서버 재실행
            # 가상 환경의 python을 직접 실행하여 'externally-managed' 에러 원천 차단
            nohup ./.venv/bin/python app.py > app.log 2>&1 &
            
            # 프로세스가 세션 종료 후에도 유지되도록 함
            disown
