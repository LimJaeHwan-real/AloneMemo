name: Deploy to EC2 (CD)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/jungle/AloneMemo

            # 2. 최신 코드 받기
            git pull origin main

            # 3. 가상 환경 내의 pip으로 라이브러리 설치
            ./.venv/bin/pip install -r requirements.txt

            # 4. 기존 실행 중인 서버 안전하게 종료
            pkill -f "python app.py" || true

            # 5. 서버 재실행 (nohup과 & 사이, 그리고 끝에 sleep 추가)
            nohup ./.venv/bin/python app.py > app.log 2>&1 &

            # 프로세스가 세션 종료에 영향받지 않도록 분리
            disown

            # 프로세스가 안정적으로 시작될 시간을 잠시 줌
            sleep 2
