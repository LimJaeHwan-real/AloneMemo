name: Deploy to EC2 (CD)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/jungle/AloneMemo
            git pull origin main
            ./.venv/bin/pip install -r requirements.txt
            
            # 1. 기존 프로세스 확실하게 종료 (포트 기준)
            sudo fuser -k 5000/tcp || true
            sleep 1

            # 2. 서버 실행 (모든 출력과 입력을 차단하고 백그라운드 실행)
            # screen이나 tmux 없이도 세션 종료에 영향받지 않도록 명령어를 구성합니다.
            MONGODB_URI="${{ secrets.MONGODB_URI }}" FLASK_ENV="production" \
            nohup ./.venv/bin/python app.py > app.log 2>&1 < /dev/null &
            
            # 3. 프로세스가 안정화될 때까지 대기 후 상태 확인
            sleep 3
            
            # 4. 프로세스가 실제로 떠 있는지 확인 (떠 있지 않으면 여기서 에러 발생)
            ps -ef | grep "python app.py" | grep -v grep
            
            echo "Deployment successful!"